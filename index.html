<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shield AI Pro - Risk Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.10.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');

:root {
  --bg: #05070a; --panel: #111827; --accent: #0ea5e9;
  --danger: #ef4444; --safe: #10b981; --text: #f8fafc;
}

body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--bg); color: var(--text); margin: 0; padding: 15px;
  display: flex; flex-direction: column; align-items: center;
}

.container { width: 100%; max-width: 1000px; display: grid; grid-template-columns: 1fr 340px; gap: 15px; }

.monitor {
  position: relative; background: #000; border-radius: 20px; overflow: hidden;
  border: 2px solid #334155; aspect-ratio: 4/3;
}
.monitor.danger-active { border-color: var(--danger); box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }

#video { width: 100%; height: 100%; object-fit: cover; }
#canvas { position: absolute; inset: 0; }

.side-panel { display: flex; flex-direction: column; gap: 12px; }
.card {
  background: var(--panel); padding: 18px; border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.05);
}

.status-label { font-family: 'DotGothic16', monospace; font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; }
.status-val { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }

.chip-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.chip {
  padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold;
  background: #1e293b; color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);
}
.chip.active-safe { background: rgba(16,185,129,0.2); color: var(--safe); border-color: var(--safe); }
.chip.active-danger { background: rgba(239,68,68,0.2); color: var(--danger); border-color: var(--danger); }

.config-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
input[type=range] { flex: 1; margin: 0 10px; accent-color: var(--accent); }

.timer-box { text-align: center; display: none; background: rgba(239,68,68,0.15); border: 1px solid var(--danger); }
.timer-box.active { display: block; }
#timer-num { font-size: 3rem; font-family: 'DotGothic16'; color: var(--danger); }

.btn {
  width: 100%; padding: 12px; border: none; border-radius: 12px;
  font-weight: 700; cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: #334155; color: white; margin-top: 8px; }

.log-area { height: 100px; overflow-y: auto; font-size: 0.7rem; color: #94a3b8; }
.log-entry { margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid #1e293b; }
</style>
</head>
<body>

<h1 style="margin-bottom: 15px; font-size: 1.4rem;">AI Baby Monitor <span style="font-size: 0.8rem; color: var(--danger);">リスク検知Pro</span></h1>

<div class="container">
  <div class="monitor" id="monitorFrame">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="alertOverlay" style="position:absolute; inset:0; background:rgba(239,68,68,0.3); display:none; align-items:center; justify-content:center; flex-direction:column; z-index:10;">
        <span style="font-size:4rem;">🚨</span>
        <h2 style="text-shadow: 0 2px 10px #000; color: #fff;">窒息リスクを検出</h2>
    </div>
  </div>

  <div class="side-panel">
    <div class="card">
      <div class="status-label">アラート猶予設定</div>
      <div class="config-row">
        <input type="range" id="thresholdRange" min="1" max="15" value="3" oninput="updateThreshold(this.value)">
        <span id="thresholdDisplay" style="font-weight:bold; color:var(--accent); min-width: 30px; text-align: right;">3</span>秒
      </div>
    </div>

    <div class="card">
      <div class="status-label">身体の状態 (Pose)</div>
      <div id="poseMain" class="status-val">--</div>
      <div class="chip-group">
        <div id="chip-body-detected" class="chip">検出</div>
        <div id="chip-body-hidden" class="chip">未検出</div>
      </div>
    </div>

    <div class="card">
      <div class="status-label">顔の状態 (Face)</div>
      <div id="faceMain" class="status-val" style="font-size: 1.1rem;">--</div>
      <div class="chip-group">
        <div id="chip-face-front" class="chip">正面</div>
        <div id="chip-face-side" class="chip">横向き</div>
        <div id="chip-face-risk" class="chip">消失/遮蔽</div>
      </div>
    </div>

    <div class="card timer-box" id="timerCard">
      <div id="timer-num">0</div>
      <div style="font-size: 0.7rem; color: var(--danger); font-weight: bold;">リスク継続中</div>
    </div>

    <button class="btn btn-primary" id="startBtn" onclick="init()">監視を開始する</button>
    <button class="btn btn-secondary" onclick="switchCamera()">🔄 カメラ切り替え</button>
    <button class="btn btn-secondary" id="muteBtn" onclick="toggleMute()">🔊 アラート：OFF</button>

    <div class="card"><div class="log-area" id="logs"></div></div>
  </div>
</div>

<script>
let detector, isRunning = false, isMuted = true;
let riskStartTime = null, alerted = false;
let currentFacingMode = "environment";
let currentStream = null;
let alertThreshold = 3;

// チャタリング防止用
let lastFaceState = "none";
let stableCounter = 0;
const STABLE_LIMIT = 5; 

function updateThreshold(v) {
  alertThreshold = parseInt(v);
  document.getElementById('thresholdDisplay').innerText = v;
}

async function init() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  try {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: currentFacingMode, width: 640, height: 480 } 
    });
    video.srcObject = currentStream;
    video.style.transform = (currentFacingMode === "user") ? "scaleX(-1)" : "scaleX(1)";
    document.getElementById('canvas').style.transform = (currentFacingMode === "user") ? "scaleX(-1)" : "scaleX(1)";

    if (!detector) {
      detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet);
    }
    isRunning = true;
    btn.innerText = "監視停止（リセット）";
    btn.onclick = () => location.reload();
    btn.disabled = false;
    loop();
  } catch (e) {
    alert("エラー: " + e.message);
    btn.disabled = false;
  }
}

async function switchCamera() {
  currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
  init();
}

async function loop() {
  if (!isRunning) return;
  const poses = await detector.estimatePoses(video);
  processFrame(poses);
  requestAnimationFrame(loop);
}

function processFrame(poses) {
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let isDangerNow = false;
  let bodyScore = 0;
  let faceScore = 0;

  if (poses.length > 0) {
    const pose = poses[0];
    const kps = {};
    pose.keypoints.forEach(k => kps[k.name] = k);

    bodyScore = Math.max(kps.left_shoulder.score, kps.right_shoulder.score);
    faceScore = (kps.nose.score + kps.left_eye.score + kps.right_eye.score) / 3;

    const isBodyVisible = bodyScore > 0.45;
    updatePoseUI(isBodyVisible);

    // 顔判定
    let rawFaceState = "hidden";
    if (faceScore > 0.45) rawFaceState = "front";
    else if (faceScore > 0.15) rawFaceState = "side";

    if (rawFaceState === lastFaceState) stableCounter++;
    else { lastFaceState = rawFaceState; stableCounter = 0; }

    if (stableCounter >= STABLE_LIMIT) updateFaceUI(rawFaceState);

    // --- 窒息リスク判定ロジック ---
    // 1. 身体はあるが顔が隠れている（布団・うつ伏せ）
    if (isBodyVisible && faceScore < 0.15) isDangerNow = true;
    // 2. 身体も顔も完全に見えない（布団への潜り込み）
    if (!isBodyVisible && faceScore < 0.15) isDangerNow = true;

    drawPose(ctx, pose, isDangerNow);
  } else {
    // 誰もいない、あるいは完全に遮蔽されている
    isDangerNow = true;
    updatePoseUI(false);
    updateFaceUI("hidden");
  }

  handleRiskTimer(isDangerNow);
}

function updatePoseUI(visible) {
  document.getElementById('poseMain').innerText = visible ? "赤ちゃんを検出中" : "未検出";
  updateChip('chip-body-detected', visible);
  updateChip('chip-body-hidden', !visible);
}

function updateFaceUI(state) {
  const main = document.getElementById('faceMain');
  const labels = { front: "正面を向いています", side: "横を向いています", hidden: "顔が確認できません" };
  main.innerText = labels[state];
  updateChip('chip-face-front', state === 'front');
  updateChip('chip-face-side', state === 'side');
  updateChip('chip-face-risk', state === 'hidden', state === 'hidden');
}

function updateChip(id, active, danger = false) {
  const el = document.getElementById(id);
  el.className = 'chip';
  if (active) el.classList.add(danger ? 'active-danger' : 'active-safe');
}

function handleRiskTimer(isDanger) {
  const card = document.getElementById('timerCard');
  const overlay = document.getElementById('alertOverlay');
  const frame = document.getElementById('monitorFrame');

  if (isDanger) {
    if (!riskStartTime) riskStartTime = Date.now();
    card.classList.add('active');
    const elapsed = Math.floor((Date.now() - riskStartTime) / 1000);
    document.getElementById('timer-num').innerText = elapsed;
    
    if (elapsed >= alertThreshold && !alerted) {
      alerted = true;
      triggerAlarm();
      overlay.style.display = "flex";
      frame.classList.add('danger-active');
    }
  } else {
    riskStartTime = null; alerted = false;
    card.classList.remove('active');
    overlay.style.display = "none";
    frame.classList.remove('danger-active');
  }
}

function triggerAlarm() {
  addLog(`🚨 アラート：顔消失を${alertThreshold}秒継続検知`, "var(--danger)");
  if (!isMuted) {
    const msg = new SpeechSynthesisUtterance("顔が隠れています。至急確認してください。");
    msg.lang = 'ja-JP';
    speechSynthesis.speak(msg);
  }
}

function drawPose(ctx, pose, isDanger) {
  ctx.fillStyle = isDanger ? "#ef4444" : "#0ea5e9";
  pose.keypoints.forEach(kp => {
    if (kp.score > 0.3) {
      ctx.beginPath(); ctx.arc(kp.x, kp.y, 5, 0, 2*Math.PI); ctx.fill();
    }
  });
}

function addLog(msg, color = "#94a3b8") {
  const area = document.getElementById('logs');
  const div = document.createElement('div');
  div.className = "log-entry"; div.style.color = color;
  div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
  area.prepend(div);
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('muteBtn').innerText = isMuted ? "🔊 アラート：OFF" : "🔇 アラート：ON";
}
</script>
</body>
</html>

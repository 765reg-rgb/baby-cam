<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shield AI - Camera Switcher2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.10.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');

:root {
  --bg: #05070a;
  --panel: #111827;
  --accent: #0ea5e9;
  --danger: #ef4444;
  --safe: #10b981;
  --text: #f8fafc;
}

body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0; padding: 20px;
  display: flex; flex-direction: column; align-items: center;
}

.container { width: 100%; max-width: 1000px; display: grid; grid-template-columns: 1fr 340px; gap: 20px; }

/* モニターエリア */
.monitor {
  position: relative;
  background: #000;
  border-radius: 20px;
  overflow: hidden;
  border: 2px solid #334155;
  aspect-ratio: 4/3;
}
.monitor.danger-active { border-color: var(--danger); box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }

#video { width: 100%; height: 100%; object-fit: cover; }
#canvas { position: absolute; inset: 0; }

/* サイドパネル */
.side-panel { display: flex; flex-direction: column; gap: 15px; }
.card {
  background: var(--panel);
  padding: 20px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.05);
}

.status-label { font-family: 'DotGothic16', monospace; font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; }
.status-val { font-size: 1.8rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }

/* 警告タイマー */
.timer-box { text-align: center; display: none; }
.timer-box.active { display: block; }
#timer-num { font-size: 3rem; font-family: 'DotGothic16'; color: var(--danger); }

.btn {
  width: 100%; padding: 15px; border: none; border-radius: 12px;
  font-weight: 700; cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: #334155; color: white; margin-top: 10px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.log-area { height: 120px; overflow-y: auto; font-size: 0.75rem; color: #94a3b8; }
.log-entry { margin-bottom: 4px; padding: 4px; border-bottom: 1px solid #1e293b; }

.danger-text { color: var(--danger); animation: flash 0.5s infinite; }
@keyframes flash { 50% { opacity: 0.3; } }
</style>
</head>
<body>

<h1 style="margin-bottom: 20px;">AI Baby Monitor Pro</h1>

<div class="container">
  <div class="monitor" id="monitorFrame">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    
    <div id="alertOverlay" style="position:absolute; inset:0; background:rgba(239,68,68,0.3); display:none; align-items:center; justify-content:center; flex-direction:column; z-index:10;">
        <span style="font-size:5rem;">🚨</span>
        <h2 style="font-size:2rem; text-shadow: 0 0 10px #000;">異常を検出</h2>
    </div>
  </div>

  <div class="side-panel">
    <div class="card">
      <div class="status-label">現在の状態</div>
      <div class="status-val" id="statusMain">--</div>
      <div id="statusSub" style="font-size:0.8rem; margin-top:5px; color:#94a3b8;">カメラ未起動</div>
    </div>

    <div class="card timer-box" id="timerCard">
      <div class="status-label">警告カウント</div>
      <div id="timer-num">0</div>
      <div style="font-size:0.7rem; color:var(--danger);">3秒継続でアラート発生</div>
    </div>

    <div class="card">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div><div class="status-label">信頼度</div><div id="conf">--%</div></div>
        <div><div class="status-label">カメラ</div><div id="cameraType" style="font-size:0.8rem; font-weight:bold;">OFF</div></div>
      </div>
    </div>

    <button class="btn btn-primary" id="startBtn" onclick="init()">監視を開始する</button>
    <button class="btn btn-secondary" id="switchBtn" onclick="switchCamera()" disabled>🔄 カメラ切り替え</button>
    <button class="btn btn-secondary" id="muteBtn" onclick="toggleMute()">🔊 音声アラート：OFF</button>

    <div class="card">
      <div class="status-label">ログ</div>
      <div class="log-area" id="logs"></div>
    </div>
  </div>
</div>

<script>
let detector, isRunning = false, isMuted = true;
let proneStartTime = null, alerted = false;
let audioCtx = null;
let currentFacingMode = "environment"; // デフォルト外カメラ
let currentStream = null;

async function init() {
  const startBtn = document.getElementById('startBtn');
  const switchBtn = document.getElementById('switchBtn');
  startBtn.disabled = true;
  addLog("システム初期化中...");

  try {
    // 古いストリームがあれば停止
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
    }

    // カメラ設定
    const constraints = {
      video: { 
        facingMode: currentFacingMode,
        width: { ideal: 640 },
        height: { ideal: 480 }
      }
    };
    
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = document.getElementById('video');
    video.srcObject = currentStream;

    // ミラーリング設定（インカメラの時だけ左右反転させる）
    video.style.transform = (currentFacingMode === "user") ? "scaleX(-1)" : "scaleX(1)";
    document.getElementById('canvas').style.transform = (currentFacingMode === "user") ? "scaleX(-1)" : "scaleX(1)";

    // モデルのロード（初回のみ）
    if (!detector) {
      addLog("AIモデル読み込み中...");
      detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, {
        modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING
      });
    }

    isRunning = true;
    startBtn.innerText = "監視停止";
    startBtn.onclick = stopMonitoring;
    startBtn.disabled = false;
    switchBtn.disabled = false;
    
    document.getElementById('cameraType').innerText = (currentFacingMode === "environment") ? "OUT (外)" : "IN (内)";
    addLog("監視を開始しました", "var(--safe)");
    
    loop();
  } catch (e) {
    addLog("エラー: " + e.message, "var(--danger)");
    startBtn.disabled = false;
  }
}

async function switchCamera() {
  currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
  addLog("カメラを切り替えます...");
  await init();
}

function stopMonitoring() {
  location.reload(); 
}

async function loop() {
  if (!isRunning) return;
  const video = document.getElementById('video');
  const poses = await detector.estimatePoses(video);
  
  updateUI(poses);
  requestAnimationFrame(loop);
}

function updateUI(poses) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const video = document.getElementById('video');
  
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (poses.length > 0) {
    const pose = poses[0];
    const kps = {};
    pose.keypoints.forEach(k => kps[k.name] = k);

    // 判定ロジック：肩が見えているのに顔が見えない＝うつ伏せ・遮蔽
    const shoulderScore = Math.max(kps.left_shoulder.score, kps.right_shoulder.score);
    const faceScore = (kps.nose.score + kps.left_eye.score + kps.right_eye.score) / 3;
    
    let state = "none";
    let sub = "赤ちゃんが見つかりません";

    if (shoulderScore > 0.45) {
      if (faceScore < 0.15) {
        state = "prone";
        sub = "顔が隠れています（うつ伏せ/布団被り）";
      } else if (faceScore > 0.4) {
        state = "safe";
        sub = "安全（仰向け検出）";
      } else {
        state = "side";
        sub = "横向き・判定注意";
      }
    }

    renderStatus(state, sub);
    drawPose(ctx, pose, state === "prone");
    handleProneTimer(state === "prone");
    
    document.getElementById('conf').innerText = Math.round(shoulderScore * 100) + "%";
  } else {
    renderStatus("none", "未検出");
    handleProneTimer(false);
  }
}

function handleProneTimer(isProne) {
  const card = document.getElementById('timerCard');
  const num = document.getElementById('timer-num');
  const frame = document.getElementById('monitorFrame');
  const overlay = document.getElementById('alertOverlay');

  if (isProne) {
    if (!proneStartTime) proneStartTime = Date.now();
    card.classList.add('active');
    const elapsed = Math.floor((Date.now() - proneStartTime) / 1000);
    num.innerText = elapsed;

    if (elapsed >= 3 && !alerted) {
      alerted = true;
      triggerAlarm();
    }
    
    if (alerted) {
      frame.classList.add('danger-active');
      overlay.style.display = "flex";
    }
  } else {
    proneStartTime = null;
    alerted = false;
    card.classList.remove('active');
    frame.classList.remove('danger-active');
    overlay.style.display = "none";
  }
}

function renderStatus(state, sub) {
  const main = document.getElementById('statusMain');
  const subEl = document.getElementById('statusSub');
  subEl.innerText = sub;

  if (state === "prone") {
    main.innerHTML = "⚠️ <span class='danger-text'>異常検出</span>";
  } else if (state === "safe") {
    main.innerHTML = "✅ <span style='color:var(--safe)'>仰向け</span>";
  } else if (state === "side") {
    main.innerHTML = "🌙 <span>横向き</span>";
  } else {
    main.innerHTML = "🔍 <span>未検出</span>";
  }
}

function triggerAlarm() {
  addLog("🚨 アラート：確認してください！", "var(--danger)");
  if (!isMuted) {
    // 1. 音声合成
    const msg = new SpeechSynthesisUtterance("赤ちゃんがうつ伏せの可能性があります。確認してください。");
    msg.lang = 'ja-JP';
    speechSynthesis.speak(msg);
    
    // 2. ビープ音
    if (!audioCtx) audioCtx = new AudioContext();
    const osc = audioCtx.createOscillator();
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 1.2);
  }
}

function drawPose(ctx, pose, isDanger) {
  ctx.fillStyle = isDanger ? "#ef4444" : "#0ea5e9";
  ctx.strokeStyle = isDanger ? "#ef4444" : "#0ea5e9";
  ctx.lineWidth = 4;

  const important = ["nose", "left_shoulder", "right_shoulder"];
  pose.keypoints.forEach(kp => {
    if (kp.score > 0.2) {
      ctx.beginPath();
      ctx.arc(kp.x, kp.y, important.includes(kp.name) ? 8 : 4, 0, 2*Math.PI);
      ctx.fill();
    }
  });
}

function addLog(msg, color = "#94a3b8") {
  const area = document.getElementById('logs');
  const div = document.createElement('div');
  div.className = "log-entry";
  div.style.color = color;
  div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
  area.prepend(div);
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('muteBtn').innerText = isMuted ? "🔊 音声アラート：OFF" : "🔇 音声アラート：ON";
  document.getElementById('muteBtn').style.color = isMuted ? "white" : "var(--safe)";
}
</script>
</body>
</html>

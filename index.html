<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shield AI - Continuous Beep</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.10.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');

:root {
  --bg: #05070a; --panel: #111827; --accent: #0ea5e9;
  --danger: #ef4444; --safe: #10b981; --text: #f8fafc;
}

body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--bg); color: var(--text); margin: 0; padding: 15px;
  display: flex; flex-direction: column; align-items: center;
}

.container { width: 100%; max-width: 1000px; display: grid; grid-template-columns: 1fr 340px; gap: 15px; }

.monitor {
  position: relative; background: #000; border-radius: 20px; overflow: hidden;
  border: 2px solid #334155; aspect-ratio: 4/3;
}
.monitor.danger-active { border-color: var(--danger); box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }

#video { width: 100%; height: 100%; object-fit: cover; }
#canvas { position: absolute; inset: 0; }

.side-panel { display: flex; flex-direction: column; gap: 12px; }
.card {
  background: var(--panel); padding: 18px; border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.05);
}

.status-label { font-family: 'DotGothic16', monospace; font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; }
.status-val { font-size: 1.2rem; font-weight: 700; }

.timer-box { text-align: center; display: none; background: rgba(239,68,68,0.2); border: 2px solid var(--danger); }
.timer-box.active { display: block; }
#timer-num { font-size: 3.5rem; font-family: 'DotGothic16'; color: var(--danger); }

.config-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
input[type=range] { flex: 1; margin: 0 10px; accent-color: var(--accent); }

.btn {
  width: 100%; padding: 15px; border: none; border-radius: 12px;
  font-weight: 700; cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: #334155; color: white; margin-top: 8px; }

.log-area { height: 120px; overflow-y: auto; font-size: 0.7rem; color: #94a3b8; background: #000; padding: 10px; border-radius: 8px; }
.log-entry { margin-bottom: 4px; border-bottom: 1px solid #1e293b; }
</style>
</head>
<body>

<h1 style="margin-bottom: 15px; font-size: 1.4rem;">AI Baby Monitor <span style="font-size: 0.8rem; color: var(--danger);">連続アラート版</span></h1>

<div class="container">
  <div class="monitor" id="monitorFrame">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="alertOverlay" style="position:absolute; inset:0; background:rgba(239,68,68,0.4); display:none; align-items:center; justify-content:center; z-index:10;">
        <h2 style="color: #fff; text-shadow: 0 2px 10px #000;">🚨 窒息リスク継続中</h2>
    </div>
  </div>

  <div class="side-panel">
    <div class="card">
      <div class="status-label">アラート猶予（秒）</div>
      <div class="config-row">
        <input type="range" id="thresholdRange" min="1" max="15" value="3" oninput="updateThreshold(this.value)">
        <span id="thresholdDisplay" style="font-weight:bold; color:var(--accent); min-width: 25px;">3</span>
      </div>
    </div>

    <div class="card timer-box" id="timerCard">
      <div class="status-label" style="color: var(--danger);">リスク継続時間</div>
      <div id="timer-num">0</div>
    </div>

    <div class="card">
      <div class="status-label">現在の状態</div>
      <div id="statusText" class="status-val">カメラ未起動</div>
    </div>

    <button class="btn btn-primary" id="startBtn" onclick="init()">監視を開始</button>
    <button class="btn btn-secondary" id="muteBtn" onclick="toggleMute()">🔊 アラート：OFF</button>

    <div class="log-area" id="logs"></div>
  </div>
</div>

<script>
let detector, isRunning = false, isMuted = true;
let riskStartTime = null;
let beepInterval = null; // 連続音用のタイマー
let currentFacingMode = "environment";
let currentStream = null;
let alertThreshold = 3;
let audioCtx = null;

function updateThreshold(v) {
  alertThreshold = parseInt(v);
  document.getElementById('thresholdDisplay').innerText = v;
}

async function init() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  try {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: currentFacingMode, width: 640, height: 480 } 
    });
    video.srcObject = currentStream;

    if (!detector) {
      detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet);
    }
    isRunning = true;
    btn.innerText = "再起動";
    btn.onclick = () => location.reload();
    btn.disabled = false;
    addLog("監視を開始しました");
    loop();
  } catch (e) {
    alert("エラー: " + e.message);
    btn.disabled = false;
  }
}

async function loop() {
  if (!isRunning) return;
  const poses = await detector.estimatePoses(video);
  processFrame(poses);
  requestAnimationFrame(loop);
}

function processFrame(poses) {
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let faceDetected = false;
  let bodyDetected = false;

  if (poses.length > 0) {
    const pose = poses[0];
    const kps = {};
    pose.keypoints.forEach(k => kps[k.name] = k);

    const sScore = Math.max(kps.left_shoulder.score, kps.right_shoulder.score);
    const fScore = (kps.nose.score + kps.left_eye.score + kps.right_eye.score) / 3;

    bodyDetected = sScore > 0.35;
    faceDetected = fScore > 0.20;

    drawPose(ctx, pose, !faceDetected);
  }

  // 「顔が見えない」ならリスク。身体の有無が激しく入れ替わっても、このフラグが優先されます。
  const isDangerNow = !faceDetected;

  updateUI(bodyDetected, faceDetected);
  handleRiskTimer(isDangerNow);
}

function updateUI(body, face) {
  const status = document.getElementById('statusText');
  if (!body && !face) status.innerText = "🔍 探索中...";
  else if (!face) status.innerText = "⚠️ 顔の消失を検出";
  else status.innerText = "✅ 正常監視中";
}

function handleRiskTimer(isDanger) {
  const card = document.getElementById('timerCard');
  const overlay = document.getElementById('alertOverlay');
  const frame = document.getElementById('monitorFrame');

  if (isDanger) {
    if (!riskStartTime) riskStartTime = Date.now();
    card.classList.add('active');
    const elapsed = Math.floor((Date.now() - riskStartTime) / 1000);
    document.getElementById('timer-num').innerText = elapsed;
    
    // 設定秒数を超えたら連続アラートを開始
    if (elapsed >= alertThreshold) {
      overlay.style.display = "flex";
      frame.classList.add('danger-active');
      startContinuousBeep();
    }
  } else {
    // 安全が確認されたら全てリセット
    riskStartTime = null;
    card.classList.remove('active');
    overlay.style.display = "none";
    frame.classList.remove('danger-active');
    stopContinuousBeep();
  }
}

// 連続アラートの開始
function startContinuousBeep() {
  if (beepInterval || isMuted) return;
  
  addLog("🚨 アラート：連続警告中", "var(--danger)");
  
  // 初回を即座に鳴らす
  triggerBeep();
  
  // 以後、0.8秒間隔で鳴らし続ける
  beepInterval = setInterval(() => {
    triggerBeep();
  }, 800);
}

// アラートの停止
function stopContinuousBeep() {
  if (beepInterval) {
    clearInterval(beepInterval);
    beepInterval = null;
    addLog("✅ リスク解消：アラート停止", "var(--safe)");
  }
}

function triggerBeep() {
  if (isMuted) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc.type = 'square';
  osc.frequency.setValueAtTime(880, now); // 高いA音
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
  
  osc.start(now);
  osc.stop(now + 0.4);
}

function drawPose(ctx, pose, isDanger) {
  ctx.fillStyle = isDanger ? "#ef4444" : "#0ea5e9";
  pose.keypoints.forEach(kp => {
    if (kp.score > 0.3) {
      ctx.beginPath(); ctx.arc(kp.x, kp.y, 4, 0, 2*Math.PI); ctx.fill();
    }
  });
}

function addLog(msg, color = "#94a3b8") {
  const area = document.getElementById('logs');
  const div = document.createElement('div');
  div.className = "log-entry"; div.style.color = color;
  div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
  area.prepend(div);
}

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('muteBtn');
  btn.innerText = isMuted ? "🔊 アラート：OFF" : "🔇 アラート：ON";
  btn.style.background = isMuted ? "#334155" : "var(--safe)";
  
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // Muteにした瞬間にアラートも止める
  if (isMuted) stopContinuousBeep();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Baby Monitor Pro - Stable Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.10.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');

:root {
  --bg: #05070a; --panel: #111827; --accent: #0ea5e9;
  --danger: #ef4444; --safe: #10b981; --text: #f8fafc;
}

body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--bg); color: var(--text); margin: 0; padding: 15px;
  display: flex; flex-direction: column; align-items: center;
}

.container { width: 100%; max-width: 1000px; display: grid; grid-template-columns: 1fr 340px; gap: 15px; }

.monitor {
  position: relative; background: #000; border-radius: 20px; overflow: hidden;
  border: 2px solid #334155; aspect-ratio: 4/3;
}
.monitor.danger-active { border-color: var(--danger); box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }

#video { width: 100%; height: 100%; object-fit: cover; }
#canvas { position: absolute; inset: 0; }

.side-panel { display: flex; flex-direction: column; gap: 12px; }
.card {
  background: var(--panel); padding: 18px; border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.05);
}

.status-label { font-family: 'DotGothic16', monospace; font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; }
.status-val { font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }

/* 判定チップ */
.chip-group { display: flex; gap: 8px; margin-top: 10px; }
.chip {
  padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold;
  background: #1e293b; color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);
}
.chip.active-safe { background: rgba(16,185,129,0.2); color: var(--safe); border-color: var(--safe); }
.chip.active-danger { background: rgba(239,68,68,0.2); color: var(--danger); border-color: var(--danger); }

.timer-box { text-align: center; display: none; background: rgba(239,68,68,0.1); }
.timer-box.active { display: block; }
#timer-num { font-size: 2.5rem; font-family: 'DotGothic16'; color: var(--danger); }

.btn {
  width: 100%; padding: 12px; border: none; border-radius: 12px;
  font-weight: 700; cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: #334155; color: white; margin-top: 8px; }

.log-area { height: 100px; overflow-y: auto; font-size: 0.7rem; color: #94a3b8; }
.log-entry { margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid #1e293b; }
</style>
</head>
<body>

<h1 style="margin-bottom: 15px; font-size: 1.5rem;">Baby Monitor AI <span style="font-size: 0.8rem; color: var(--accent);">STABLE</span></h1>

<div class="container">
  <div class="monitor" id="monitorFrame">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="alertOverlay" style="position:absolute; inset:0; background:rgba(239,68,68,0.3); display:none; align-items:center; justify-content:center; flex-direction:column; z-index:10;">
        <span style="font-size:4rem;">🚨</span>
        <h2 style="text-shadow: 0 2px 10px #000;">確認してください</h2>
    </div>
  </div>

  <div class="side-panel">
    <div class="card">
      <div class="status-label">身体の状態 (Pose)</div>
      <div class="status-val" id="poseMain">--</div>
      <div class="chip-group">
        <div id="chip-supine" class="chip">仰向け</div>
        <div id="chip-prone" class="chip">うつ伏せ</div>
      </div>
    </div>

    <div class="card">
      <div class="status-label">顔の向き (Face)</div>
      <div class="status-val" id="faceMain" style="font-size: 1.2rem;">--</div>
      <div class="chip-group">
        <div id="chip-front" class="chip">正面</div>
        <div id="chip-side" class="chip">横向き</div>
        <div id="chip-hidden" class="chip">消失</div>
      </div>
    </div>

    <div class="card timer-box" id="timerCard">
      <div class="status-label">警告継続秒数</div>
      <div id="timer-num">0</div>
    </div>

    <div class="card" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
      <div><div class="status-label">身体信頼度</div><div id="conf-p">--%</div></div>
      <div><div class="status-label">顔信頼度</div><div id="conf-f">--%</div></div>
    </div>

    <button class="btn btn-primary" id="startBtn" onclick="init()">監視を開始する</button>
    <button class="btn btn-secondary" onclick="switchCamera()">🔄 カメラ切り替え</button>
    <button class="btn btn-secondary" id="muteBtn" onclick="toggleMute()">🔊 アラート：OFF</button>

    <div class="card"><div class="log-area" id="logs"></div></div>
  </div>
</div>

<script>
let detector, isRunning = false, isMuted = true;
let proneStartTime = null, alerted = false;
let currentFacingMode = "environment";
let currentStream = null;

// 安定化のための履歴変数
let lastFaceState = "none";
let faceStateCounter = 0;
const STABLE_THRESHOLD = 5; // 5フレーム連続で同じ状態なら変更を認める

async function init() {
  const startBtn = document.getElementById('startBtn');
  startBtn.disabled = true;
  try {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: currentFacingMode, width: 640, height: 480 } 
    });
    const video = document.getElementById('video');
    video.srcObject = currentStream;
    video.style.transform = (currentFacingMode === "user") ? "scaleX(-1)" : "scaleX(1)";

    if (!detector) {
      detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet);
    }
    isRunning = true;
    startBtn.innerText = "監視中...";
    loop();
  } catch (e) {
    alert("エラー: " + e.message);
    startBtn.disabled = false;
  }
}

async function switchCamera() {
  currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
  init();
}

async function loop() {
  if (!isRunning) return;
  const poses = await detector.estimatePoses(video);
  processPoses(poses);
  requestAnimationFrame(loop);
}

function processPoses(poses) {
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (poses.length > 0) {
    const pose = poses[0];
    const kps = {};
    pose.keypoints.forEach(k => kps[k.name] = k);

    // スコア計算
    const sScore = Math.max(kps.left_shoulder.score, kps.right_shoulder.score);
    const fScore = (kps.nose.score + kps.left_eye.score + kps.right_eye.score) / 3;

    // 1. 身体の状態判定 (Pose)
    const poseState = (sScore > 0.45) ? "detected" : "none";
    document.getElementById('poseMain').innerText = (poseState === "detected") ? "赤ちゃんを検出" : "--";
    updateChip('chip-supine', fScore > 0.35);
    updateChip('chip-prone', sScore > 0.45 && fScore < 0.15);

    // 2. 顔の向き判定 (Face) + チャタリング防止
    let rawFaceState = "hidden";
    if (fScore > 0.45) rawFaceState = "front";
    else if (fScore > 0.15) rawFaceState = "side";

    if (rawFaceState === lastFaceState) {
      faceStateCounter++;
    } else {
      lastFaceState = rawFaceState;
      faceStateCounter = 0;
    }

    if (faceStateCounter >= STABLE_THRESHOLD) {
      updateFaceUI(rawFaceState);
    }

    // 3. 警告ロジック
    const isDanger = (sScore > 0.45 && fScore < 0.15);
    handleProneTimer(isDanger);

    document.getElementById('conf-p').innerText = Math.round(sScore * 100) + "%";
    document.getElementById('conf-f').innerText = Math.round(fScore * 100) + "%";
    drawPose(ctx, pose, isDanger);
  }
}

function updateFaceUI(state) {
  const main = document.getElementById('faceMain');
  const labels = { front: "正面を向いています", side: "横を向いています", hidden: "顔が見えません" };
  main.innerText = labels[state];
  updateChip('chip-front', state === 'front');
  updateChip('chip-side', state === 'side');
  updateChip('chip-hidden', state === 'hidden', true);
}

function updateChip(id, isActive, isDanger = false) {
  const el = document.getElementById(id);
  el.className = 'chip';
  if (isActive) {
    el.classList.add(isDanger ? 'active-danger' : 'active-safe');
  }
}

function handleProneTimer(isDanger) {
  const card = document.getElementById('timerCard');
  const overlay = document.getElementById('alertOverlay');
  if (isDanger) {
    if (!proneStartTime) proneStartTime = Date.now();
    card.classList.add('active');
    const elapsed = Math.floor((Date.now() - proneStartTime) / 1000);
    document.getElementById('timer-num').innerText = elapsed;
    if (elapsed >= 3 && !alerted) {
      alerted = true;
      triggerAlarm();
      overlay.style.display = "flex";
    }
  } else {
    proneStartTime = null; alerted = false;
    card.classList.remove('active');
    overlay.style.display = "none";
  }
}

function triggerAlarm() {
  addLog("🚨 警告：うつ伏せ/遮蔽を検出", "var(--danger)");
  if (!isMuted) {
    const msg = new SpeechSynthesisUtterance("赤ちゃんがうつ伏せです。");
    msg.lang = 'ja-JP';
    speechSynthesis.speak(msg);
  }
}

function drawPose(ctx, pose, isDanger) {
  ctx.fillStyle = isDanger ? "#ef4444" : "#0ea5e9";
  pose.keypoints.forEach(kp => {
    if (kp.score > 0.3) {
      ctx.beginPath(); ctx.arc(kp.x, kp.y, 5, 0, 2*Math.PI); ctx.fill();
    }
  });
}

function addLog(msg, color = "#94a3b8") {
  const area = document.getElementById('logs');
  const div = document.createElement('div');
  div.className = "log-entry"; div.style.color = color;
  div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
  area.prepend(div);
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('muteBtn').innerText = isMuted ? "🔊 アラート：OFF" : "🔇 アラート：ON";
}
</script>
</body>
</html>

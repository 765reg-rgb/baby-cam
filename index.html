<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shield AI - Stable Orientation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.10.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');

:root {
  --bg: #05070a; --panel: #111827; --accent: #0ea5e9;
  --danger: #ef4444; --safe: #10b981; --warn: #f59e0b; --text: #f8fafc;
}

body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--bg); color: var(--text); margin: 0; padding: 15px;
  display: flex; flex-direction: column; align-items: center;
}

.container { width: 100%; max-width: 1050px; display: grid; grid-template-columns: 1fr 340px; gap: 15px; }

.monitor {
  position: relative; background: #000; border-radius: 20px; overflow: hidden;
  border: 2px solid #334155; aspect-ratio: 4/3;
}
.monitor.danger-active { border-color: var(--danger); box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }

#video { width: 100%; height: 100%; object-fit: cover; }
#canvas { position: absolute; inset: 0; }

.side-panel { display: flex; flex-direction: column; gap: 10px; }
.card {
  background: var(--panel); padding: 15px; border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.05);
}

.status-label { font-family: 'DotGothic16', monospace; font-size: 0.7rem; color: #94a3b8; margin-bottom: 4px; }
.status-val { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }

.chip {
  display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; font-weight: bold;
  background: #1e293b; color: #94a3b8; margin-top: 5px;
}
.active-danger { background: rgba(239,68,68,0.2); color: var(--danger); border: 1px solid var(--danger); }
.active-safe { background: rgba(16,185,129,0.2); color: var(--safe); border: 1px solid var(--safe); }

.timer-box { text-align: center; display: none; background: rgba(239,68,68,0.2); border: 2px solid var(--danger); }
.timer-box.active { display: block; }
#timer-num { font-size: 3.5rem; font-family: 'DotGothic16'; color: var(--danger); }

.config-row { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
input[type=range] { flex: 1; margin: 0 10px; accent-color: var(--accent); }

.btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  font-weight: 700; cursor: pointer; transition: 0.2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: #334155; color: white; margin-top: 8px; }

.log-area { height: 100px; overflow-y: auto; font-size: 0.65rem; color: #94a3b8; background: #000; padding: 10px; border-radius: 8px; }
</style>
</head>
<body>

<h1 style="margin-bottom: 15px; font-size: 1.3rem;">Baby Shield AI <span style="font-size: 0.8rem; color: var(--accent);">向き・顔判定Pro</span></h1>

<div class="container">
  <div class="monitor" id="monitorFrame">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="alertOverlay" style="position:absolute; inset:0; background:rgba(239,68,68,0.4); display:none; align-items:center; justify-content:center; flex-direction:column; z-index:10;">
        <h2 style="color: #fff; text-shadow: 0 2px 10px #000;">🚨 窒息リスク：顔消失</h2>
    </div>
  </div>

  <div class="side-panel">
    <div class="card">
      <div class="status-label">アラート猶予（秒）</div>
      <div class="config-row">
        <input type="range" id="thresholdRange" min="1" max="15" value="3" oninput="updateThreshold(this.value)">
        <span id="thresholdDisplay" style="font-weight:bold; color:var(--accent);">3</span>
      </div>
    </div>

    <div class="card">
      <div class="status-label">身体の向き (Orientation)</div>
      <div id="orientVal" class="status-val">--</div>
      <div id="orientChip" class="chip">状態確認中</div>
    </div>

    <div class="card">
      <div class="status-label">顔の露出 (Face)</div>
      <div id="faceVal" class="status-val">--</div>
      <div id="faceChip" class="chip">検出待機中</div>
    </div>

    <div class="card timer-box" id="timerCard">
      <div class="status-label" style="color: var(--danger);">リスク継続時間</div>
      <div id="timer-num">0</div>
    </div>

    <button class="btn btn-primary" id="startBtn" onclick="init()">監視を開始</button>
    <button class="btn btn-secondary" id="muteBtn" onclick="toggleMute()">🔊 ビープ音：OFF</button>

    <div class="log-area" id="logs"></div>
  </div>
</div>

<script>
let detector, isRunning = false, isMuted = true;
let riskStartTime = null;
let beepInterval = null;
let currentStream = null;
let alertThreshold = 3;
let audioCtx = null;

// 安定化用の状態保持
let lastKnownIsDanger = false;

function updateThreshold(v) {
  alertThreshold = parseInt(v);
  document.getElementById('thresholdDisplay').innerText = v;
}

async function init() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  try {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "environment", width: 640, height: 480 } 
    });
    video.srcObject = currentStream;
    if (!detector) detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet);
    isRunning = true;
    btn.innerText = "再起動";
    btn.onclick = () => location.reload();
    btn.disabled = false;
    loop();
  } catch (e) {
    alert("エラー: " + e.message);
    btn.disabled = false;
  }
}

async function loop() {
  if (!isRunning) return;
  const poses = await detector.estimatePoses(video);
  processFrame(poses);
  requestAnimationFrame(loop);
}

function processFrame(poses) {
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let faceScore = 0;
  let shoulderScore = 0;
  let orientation = "不明";
  let faceState = "隠れています";
  let isDangerNow = true;

  if (poses.length > 0) {
    const pose = poses[0];
    const kps = {};
    pose.keypoints.forEach(k => kps[k.name] = k);

    // スコア算出
    faceScore = (kps.nose.score + kps.left_eye.score + kps.right_eye.score) / 3;
    shoulderScore = (kps.left_shoulder.score + kps.right_shoulder.score) / 2;

    // 顔の状態判定
    if (faceScore > 0.4) {
      faceState = "はっきり見えます";
      isDangerNow = false;
    } else if (faceScore > 0.15) {
      faceState = "一部隠れています";
      isDangerNow = false; // わずかでも顔が認識されていれば安全寄り
    } else {
      faceState = "隠れています";
      isDangerNow = true;
    }

    // 身体の向き判定ロジック
    if (shoulderScore > 0.4) {
      if (faceScore > 0.3) orientation = "仰向け";
      else if (faceScore > 0.1) orientation = "横向き";
      else orientation = "うつ伏せ";
    } else {
      orientation = "検出不安定";
    }

    // チャタリング改善のキモ：
    // 「身体（肩）が見えなくなった」＝「布団に完全に潜った」可能性が高いため、
    // 顔が同時に見えていなければ、身体が未検出になってもリスク判定（true）を維持します。
    if (shoulderScore < 0.2 && faceScore < 0.2) {
      isDangerNow = true; 
    }

    drawPose(ctx, pose, isDangerNow);
  } else {
    // 誰もいない、あるいは完全遮蔽
    isDangerNow = true;
    orientation = "未検出";
    faceState = "未検出";
  }

  updateStatusUI(orientation, faceState, isDangerNow);
  handleRiskTimer(isDangerNow);
}

function updateStatusUI(orient, face, isDanger) {
  document.getElementById('orientVal').innerText = orient;
  const oChip = document.getElementById('orientChip');
  oChip.innerText = orient === "うつ伏せ" ? "要確認" : "検知中";
  oChip.className = `chip ${orient === "うつ伏せ" ? "active-danger" : "active-safe"}`;

  document.getElementById('faceVal').innerText = face;
  const fChip = document.getElementById('faceChip');
  fChip.innerText = isDanger ? "危険" : "正常";
  fChip.className = `chip ${isDanger ? "active-danger" : "active-safe"}`;
}

function handleRiskTimer(isDanger) {
  const card = document.getElementById('timerCard');
  const overlay = document.getElementById('alertOverlay');
  const frame = document.getElementById('monitorFrame');

  if (isDanger) {
    if (!riskStartTime) riskStartTime = Date.now();
    card.classList.add('active');
    const elapsed = Math.floor((Date.now() - riskStartTime) / 1000);
    document.getElementById('timer-num').innerText = elapsed;
    
    if (elapsed >= alertThreshold) {
      overlay.style.display = "flex";
      frame.classList.add('danger-active');
      startContinuousBeep();
    }
  } else {
    riskStartTime = null;
    card.classList.remove('active');
    overlay.style.display = "none";
    frame.classList.remove('danger-active');
    stopContinuousBeep();
  }
}

function startContinuousBeep() {
  if (beepInterval || isMuted) return;
  triggerBeep();
  beepInterval = setInterval(triggerBeep, 800);
}

function stopContinuousBeep() {
  if (beepInterval) {
    clearInterval(beepInterval);
    beepInterval = null;
  }
}

function triggerBeep() {
  if (isMuted) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  
  osc.type = 'square';
  osc.frequency.setValueAtTime(950, now); // 少し高めの警告音
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
  osc.start(now); osc.stop(now + 0.5);
}

function drawPose(ctx, pose, isDanger) {
  ctx.fillStyle = isDanger ? "#ef4444" : "#0ea5e9";
  pose.keypoints.forEach(kp => {
    if (kp.score > 0.25) {
      ctx.beginPath(); ctx.arc(kp.x, kp.y, 4, 0, 2*Math.PI); ctx.fill();
    }
  });
}

function addLog(msg, color = "#94a3b8") {
  const area = document.getElementById('logs');
  const div = document.createElement('div');
  div.style.color = color;
  div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
  area.prepend(div);
}

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('muteBtn');
  btn.innerText = isMuted ? "🔊 ビープ音：OFF" : "🔇 ビープ音：ON";
  btn.style.background = isMuted ? "#334155" : "var(--safe)";
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isMuted) stopContinuousBeep();
}
</script>
</body>
</html>
